services:
  - type: worker
    name: kairo-verify
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: CLIENT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: kairo-db
          property: connectionString
      - key: DASHBOARD_URL
        sync: false
      - key: NODE_ENV
        value: production

databases:
  - name: kairo-db
    plan: free
    databaseName: kairo_verify

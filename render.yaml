services:
  - type: worker
    name: kairo-verify
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate && npx tsc
    startCommand: npx prisma db push && node dist/bot.js
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: CLIENT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: kairo-db
          property: connectionString
      - key: DASHBOARD_URL
        sync: false

databases:
  - name: kairo-db
    plan: free
    databaseName: kairo_verify

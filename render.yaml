services:
  - type: worker
    name: kairo-verify
    runtime: node
    plan: free
    buildCommand: npm install --include=dev
    startCommand: npm run build && npm start
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: kairo-db
          property: connectionString
      - key: DASHBOARD_URL
        sync: false

databases:
  - name: kairo-db
    plan: free
    databaseName: kairo_verify
